<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #1a1a1a; color: white; }
    canvas { border: 1px solid #333; margin: 10px; }
    .icon-row { display: flex; align-items: center; gap: 20px; margin: 20px 0; }
    button { padding: 10px 20px; cursor: pointer; }
    a { color: #3ea6ff; }
  </style>
</head>
<body>
  <h1>YouTube Collections - Icon Generator</h1>
  <p>Right-click each canvas and "Save image as..." with the corresponding filename.</p>
  
  <div class="icon-row">
    <div>
      <canvas id="icon16" width="16" height="16"></canvas>
      <p>icon16.png</p>
    </div>
    <div>
      <canvas id="icon32" width="32" height="32"></canvas>
      <p>icon32.png</p>
    </div>
    <div>
      <canvas id="icon48" width="48" height="48"></canvas>
      <p>icon48.png</p>
    </div>
    <div>
      <canvas id="icon128" width="128" height="128"></canvas>
      <p>icon128.png</p>
    </div>
  </div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const scale = size / 24;
      
      // Background
      ctx.fillStyle = '#3ea6ff';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.15);
      ctx.fill();
      
      // Folder icon
      ctx.save();
      ctx.translate(size * 0.15, size * 0.2);
      ctx.scale(scale * 0.7, scale * 0.7);
      
      // Folder back
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.moveTo(2, 4);
      ctx.lineTo(2, 20);
      ctx.quadraticCurveTo(2, 22, 4, 22);
      ctx.lineTo(20, 22);
      ctx.quadraticCurveTo(22, 22, 22, 20);
      ctx.lineTo(22, 8);
      ctx.quadraticCurveTo(22, 6, 20, 6);
      ctx.lineTo(12, 6);
      ctx.lineTo(10, 4);
      ctx.lineTo(4, 4);
      ctx.quadraticCurveTo(2, 4, 2, 6);
      ctx.closePath();
      ctx.fill();
      
      // Folder tab
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.moveTo(2, 6);
      ctx.lineTo(2, 10);
      ctx.lineTo(22, 10);
      ctx.lineTo(22, 8);
      ctx.quadraticCurveTo(22, 6, 20, 6);
      ctx.lineTo(12, 6);
      ctx.lineTo(10, 4);
      ctx.lineTo(4, 4);
      ctx.quadraticCurveTo(2, 4, 2, 6);
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
    }
    
    drawIcon('icon16', 16);
    drawIcon('icon32', 32);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
  </script>
</body>
</html>
